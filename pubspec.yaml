name: hardlist
description: Aplicativo inteligente para listas de compras.
publish_to: 'none' # Impede a publicação acidental do aplicativo na internet

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  
  # --- INTERFACE E VISUAL ---
  cupertino_icons: ^1.0.8
  
  # --- NUVEM E AUTENTICAÇÃO (Cloud) ---
  supabase_flutter: ^2.12.0
  google_sign_in: ^7.2.0
  
  # --- BANCO DE DADOS LOCAL (Offline) ---
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2 # Adaptador para testar o banco no Windows
  
  # --- UTILITÁRIOS E FERRAMENTAS ---
  image_picker: ^1.2.1 # Para tirar fotos dos produtos
  uuid: ^4.5.3         # Gerador de códigos únicos para produtos offline
  path: ^1.9.1         # Auxiliar para achar os caminhos das pastas no celular
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Regras de boas práticas e código limpo da Google

flutter:
  uses-material-design: true

  # --- PASTA DE ARQUIVOS LOCAIS ---
  assets:
    - assets/images/